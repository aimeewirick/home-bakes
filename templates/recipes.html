<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBakes — My Recipe Box</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/recipes.css" />
</head>
<body>

  <!-- Universal nav injected by nav.js -->
  <div class="page-banner" >
        <div><h1 >Recipes</h1></div>
        <div class="search-wrapper">
          <div class="search-bar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search recipes..." />
            <img class="recipe-box-img"
              src="/static/images/recipe_box1.png"
              alt="My Recipe Box"
              style="width: 30%; height: auto;"
              onerror="this.style.display='none'" />
          </div>
      </div>
  </div>
  <div class="page-content">

    <!-- Search bar -->


          <!-- Add recipe button -->
      <a href="/recipe-form.html" class="btn-add-new">
        <span class="btn-add-new-circle">
          <svg viewBox="0 0 24 24" fill="none">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </span>
        <span class="btn-add-new-oval">add recipe</span>
      </a>


    <!-- Main layout: recipe grid + vertical tabs -->
    <div class="recipes-layout">

      <!-- Recipe grid — 75% -->
      <div class="recipes-grid-wrapper">
        <div class="recipes-grid" id="recipesGrid">
          <div class="loading-state">Loading your recipes...</div>
        </div>
      </div>

      <!-- Vertical category tabs — 25% -->
      <div class="category-tabs" id="categoryTabs">
        <!-- Injected by JS from Firestore -->
      </div>

    </div>

  </div><!-- end page-content -->

<script type="module">
  import "/static/js/nav.js";
  import { requireAuth } from "/static/js/auth.js";
  import { getMyRecipes, getPublicRecipes, getRecipeCategories } from "/static/js/api.js";

  let allRecipes      = [];
  let activeCategory  = "All";
  let searchQuery     = "";

  requireAuth(async () => {
    try {
      // Load recipes and categories in parallel
      const [mine, publicRecipes, categories] = await Promise.all([
        getMyRecipes(),
        getPublicRecipes(),
        getRecipeCategories()
      ]);

      // Merge and deduplicate
      const seen = new Set();
      allRecipes = [...mine, ...publicRecipes].filter(r => {
        if (seen.has(r.id)) return false;
        seen.add(r.id);
        return true;
      });

      buildTabs(categories);
      renderRecipes();
    } catch (err) {
      console.error("Failed to load:", err);
      document.getElementById("recipesGrid").innerHTML =
        `<div class="loading-state">Failed to load recipes. Please refresh.</div>`;
    }
  });

  // ── Build vertical category tabs ──────────────────────────────────────────
  function buildTabs(categories) {
    const container = document.getElementById("categoryTabs");
    container.innerHTML = "";
    categories.forEach(cat => {
      const tab = document.createElement("button");
      tab.className = "category-tab" + (cat.name === "All" ? " active" : "");
      tab.textContent = cat.name;
      tab.dataset.category = cat.name;
      tab.addEventListener("click", () => {
        document.querySelectorAll(".category-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        activeCategory = cat.name;
        renderRecipes();
      });
      container.appendChild(tab);
    });
  }

  // ── Render recipe cards ───────────────────────────────────────────────────
  function renderRecipes() {
    const grid = document.getElementById("recipesGrid");
    let filtered = allRecipes;

    // Filter by category
    if (activeCategory !== "All") {
      filtered = filtered.filter(r => r.recipe_category === activeCategory);
    }

    // Filter by search
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(r =>
        r.title?.toLowerCase().includes(q) ||
        r.meal_type?.toLowerCase().includes(q) ||
        r.recipe_category?.toLowerCase().includes(q)
      );
    }

    // Sort alphabetically
    filtered.sort((a, b) => (a.title || "").localeCompare(b.title || ""));

    // Empty states
    if (filtered.length === 0) {
      if (allRecipes.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <h3>Your recipe box is empty!</h3>
            <p>Add your first family recipe to get started.</p>
            <a href="/recipe-form.html" class="btn btn-primary">+ Add your first recipe</a>
          </div>`;
      } else {
        grid.innerHTML = `
          <div class="empty-state">
            <h3>No recipes found</h3>
            <p>Try a different search or category.</p>
          </div>`;
      }
      return;
    }

    // Build cards
    grid.innerHTML = filtered.map(recipe => `
      <a class="recipe-list-card" href="/recipe-view.html?id=${recipe.id}">
        <div class="recipe-thumb">
          ${recipe.imageUrl
            ? `<img src="${recipe.imageUrl}" alt="${recipe.title}" />`
            : `<span class="recipe-thumb-placeholder">🍽️</span>`
          }
        </div>
        <div class="recipe-card-info">
          <div class="recipe-card-title">${recipe.title || "Untitled"}</div>
          <div class="recipe-card-meta">
            ${[recipe.meal_type, recipe.recipe_category].filter(Boolean).join(" · ") || "No category"}
          </div>
        </div>
      </a>
    `).join("");
  }

  // ── Search ────────────────────────────────────────────────────────────────
  document.getElementById("searchInput").addEventListener("input", e => {
    searchQuery = e.target.value.trim();
    renderRecipes();
  });

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBakes — Create Account</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/register.css" />
</head>
<body>

  <header class="reg-header">
    <span class="reg-header-title">HomeBakes</span>
  </header>

  <div class="reg-container">
    <div class="reg-card">

      <div class="reg-card-banner">
        <h1>Join HomeBakes</h1>
        <p>Create your personal recipe kitchen</p>
      </div>

      <div class="reg-form">
        <div class="form-group">
          <label for="displayName">Your Name</label>
          <input type="text" id="displayName" class="form-control" placeholder="e.g. Grandma Rose" />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" />
        </div>

        <div class="reg-divider"></div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="At least 6 characters" />
          <div class="password-strength">
            <div class="password-strength-bar" id="strengthBar"></div>
          </div>
          <p class="strength-text" id="strengthText"></p>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter your password" />
        </div>

        <div class="error-msg" id="regError"></div>
        <button class="btn-register" id="registerBtn">Create My Kitchen</button>
        <div class="reg-footer">Already have an account? <a href="/login.html">Log in</a></div>
      </div>
    </div>
  </div>

<script type="module">
  import { register, redirectIfLoggedIn } from "/static/js/auth.js";
  redirectIfLoggedIn();

  document.getElementById("password").addEventListener("input", function() {
    const val = this.value;
    const bar = document.getElementById("strengthBar");
    const text = document.getElementById("strengthText");
    let s = 0;
    if (val.length >= 6) s++;
    if (val.length >= 10) s++;
    if (/[A-Z]/.test(val)) s++;
    if (/[0-9]/.test(val)) s++;
    if (/[^A-Za-z0-9]/.test(val)) s++;
    const L = [
      { w: "0%",   c: "",        l: "" },
      { w: "25%",  c: "#e74c3c", l: "Weak" },
      { w: "50%",  c: "#e67e22", l: "Fair" },
      { w: "75%",  c: "#f1c40f", l: "Good" },
      { w: "100%", c: "#27ae60", l: "Strong" }
    ];
    const lv = L[Math.min(s, 4)];
    bar.style.width = lv.w;
    bar.style.background = lv.c;
    text.textContent = lv.l ? `Password strength: ${lv.l}` : "";
  });

  document.getElementById("registerBtn").addEventListener("click", async () => {
    const name     = document.getElementById("displayName").value.trim();
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm  = document.getElementById("confirmPassword").value;
    const errorEl  = document.getElementById("regError");
    errorEl.classList.remove("visible");
    if (!name)              return show(errorEl, "Please enter your name.");
    if (!email)             return show(errorEl, "Please enter your email.");
    if (password.length < 6) return show(errorEl, "Password must be at least 6 characters.");
    if (password !== confirm) return show(errorEl, "Passwords do not match.");
    try {
      await register(email, password, name);
      window.location.href = "/index.html";
    } catch (err) {
      show(errorEl, friendlyError(err.code));
    }
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("registerBtn").click();
  });

  function show(el, msg) { el.textContent = msg; el.classList.add("visible"); }
  function friendlyError(code) {
    return {
      "auth/email-already-in-use": "An account with this email already exists.",
      "auth/invalid-email":        "Please enter a valid email address.",
      "auth/weak-password":        "Password too weak.",
    }[code] || "Registration failed. Please try again.";
  }
</script>
</body>
</html>

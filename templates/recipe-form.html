<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBakes — Add Recipe</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/recipe-form.css" />
</head>
<body>

  <!-- Universal nav injected by nav.js -->

  <div class="page-content">

    <!-- Top bar: title + back button -->
    <div class="top-bar">
      <h1 id="pageTitle">Add a Recipe</h1>
      <a href="/recipes.html" class="btn-cancel">← Back to Recipes</a>
    </div>

    <!-- Font picker — sits ABOVE the card, below the top bar -->
    <!-- Extra margin-bottom leaves room for the card tab that floats up -->
    <div class="font-picker">
      <span class="font-picker-label">Card font:</span>
      <button class="font-btn typewriter active"  data-font="font-typewriter">Typewriter</button>
      <button class="font-btn handwriting"         data-font="font-handwriting">Grandma's Hand</button>
      <button class="font-btn modern"              data-font="font-modern">Modern</button>
    </div>

    <!-- Recipe card outer — handles the irregular drop shadow -->
    <div class="recipe-card-outer">

      <!-- CSS folder tab — floats above the card -->
      <div class="card-tab">
        <span class="card-tab-text" id="cardTab">RECIPE</span>
      </div>

      <!-- The unified card — tab and body share same color + texture -->
      <div class="recipe-card">
        <div class="recipe-card-body font-typewriter" id="recipeCardBody">

          <!-- Recipe name + meal type + category -->
          <div class="recipe-header-row">
            <div class="form-group">
              <label for="recipeTitle">Recipe Name</label>
              <input type="text" id="recipeTitle"
                     placeholder="e.g. Grandma's Apple Pie" maxlength="100" />
            </div>
            <div class="form-group">
              <label for="mealType">Meal Type</label>
              <select id="mealType">
                <option value="">Loading...</option>
              </select>
            </div>
            <div class="form-group">
              <label for="recipeCategory">Recipe Category</label>
              <select id="recipeCategory">
                <option value="">Loading...</option>
              </select>
            </div>
          </div>

          <!-- Ingredients -->
          <div class="section-header">Ingredients</div>
          <div class="ingredients-table-wrapper">
            <table class="ingredients-table">
              <thead>
                <tr>
                  <th>Ingredient</th>
                  <th style="width:75px">Amount</th>
                  <th style="width:85px">Unit</th>
                  <th>Note</th>
                  <th style="width:30px"></th>
                </tr>
              </thead>
              <tbody id="ingredientsBody"></tbody>
            </table>
          </div>
          <button class="btn-add-ingredient" id="addIngredientBtn" type="button">
            + add ingredient
          </button>

          <!-- Directions -->
          <div class="section-header" style="margin-top:1.75rem">Directions</div>
          <div id="directionsBody"></div>
          <button class="btn-add-direction" id="addDirectionBtn" type="button">
            + add direction section
          </button>

          <!-- Recipe photo upload -->
          <div class="image-upload-section">
            <div class="section-header">Recipe Photo</div>
            <div class="image-upload-area" id="imageUploadArea">
              <div class="image-placeholder" id="imagePlaceholder">
                <span class="image-placeholder-icon">📸</span>
                <p class="image-placeholder-text">
                  The dish that will go down in family legend —<br>
                  show us what we're missing!
                </p>
                <p class="image-placeholder-sub">Click or drag & drop a photo here</p>
              </div>
              <img class="image-preview" id="imagePreview" alt="Recipe photo preview" />
              <div class="image-change-hint">
                <span>📷 Change photo</span>
              </div>
            </div>
            <input type="file" id="recipeImageInput" accept="image/*" style="display:none;" />
          </div>

          <!-- Form actions -->
          <div class="form-actions">
            <div class="toggle-group">
              <label class="toggle-switch">
                <input type="checkbox" id="isPublic" />
                <span class="toggle-slider"></span>
              </label>
              Make recipe public
            </div>
            <div class="form-actions-right">
              <div class="saving-msg" id="savingMsg">
                <div class="spinner"></div>Saving...
              </div>
              <a href="/recipes.html" class="btn-cancel">Cancel</a>
              <button class="btn-save" id="saveBtn" type="button">Save Recipe</button>
            </div>
          </div>

        </div><!-- end recipe-card-body -->

        <!-- ══════════════════════════════════════════
             CUTLERY FOOTER
             - No border, no background override
             - Seamlessly part of the teal card
             - Centered SVG spoon + fork
        ══════════════════════════════════════════ -->
        <div class="recipe-card-footer">
          <div class="cutlery-icon">
            <svg viewBox="0 0 100 35"
                 xmlns="http://www.w3.org/2000/svg"
                 width="80" height="28">

              <!-- Spoon: bowl + handle -->
              <ellipse cx="35" cy="7" rx="6" ry="7"
                       fill="#35595F" opacity="0.6"/>
              <rect x="33" y="13" width="4" height="18"
                    rx="2" fill="#35595F" opacity="0.6"/>

              <!-- Fork: 3 tines + connector + handle -->
              <rect x="59" y="2" width="2.5" height="10"
                    rx="1.25" fill="#35595F" opacity="0.6"/>
              <rect x="64" y="2" width="2.5" height="10"
                    rx="1.25" fill="#35595F" opacity="0.6"/>
              <rect x="69" y="2" width="2.5" height="10"
                    rx="1.25" fill="#35595F" opacity="0.6"/>
              <rect x="59" y="11" width="12.5" height="2"
                    rx="1" fill="#35595F" opacity="0.6"/>
              <rect x="63.5" y="12" width="4" height="18"
                    rx="2" fill="#35595F" opacity="0.6"/>

            </svg>
          </div>
        </div>

      </div><!-- end recipe-card -->
    </div><!-- end recipe-card-outer -->
  </div><!-- end page-content -->

<script type="module">
  import "/static/js/nav.js";
  import "/static/js/recipe-form.js";
  import { getMealTypes, getRecipeCategories } from "/static/js/api.js";

  // ── Load dropdowns from Firestore ─────────────────────────────────────────
  async function loadDropdowns() {
    try {
      const [mealTypes, categories] = await Promise.all([
        getMealTypes(),
        getRecipeCategories()
      ]);

      const mealSelect = document.getElementById("mealType");
      mealSelect.innerHTML = '<option value="">Select...</option>';
      mealTypes.forEach(mt => {
        const opt = document.createElement("option");
        opt.value = mt.name;
        opt.textContent = mt.name;
        mealSelect.appendChild(opt);
      });

      const catSelect = document.getElementById("recipeCategory");
      catSelect.innerHTML = '<option value="">Select...</option>';
      // Skip "All" — that's only for filtering
      categories.filter(c => c.name !== "All").forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat.name;
        opt.textContent = cat.name;
        catSelect.appendChild(opt);
      });

    } catch (err) {
      console.error("Failed to load dropdowns:", err);
    }
  }

  loadDropdowns();
  // ── Font picker ────────────────────────────────────────────────────────────
  const cardBody = document.getElementById("recipeCardBody");
  const fontBtns = document.querySelectorAll(".font-btn");
  const FONT_KEY = "hb_recipe_font";

  const savedFont = localStorage.getItem(FONT_KEY) || "font-typewriter";
  applyFont(savedFont);

  fontBtns.forEach(btn => {
    btn.addEventListener("click", () => {
      applyFont(btn.dataset.font);
      localStorage.setItem(FONT_KEY, btn.dataset.font);
    });
  });

  function applyFont(fontClass) {
    cardBody.classList.remove("font-typewriter", "font-handwriting", "font-modern");
    cardBody.classList.add(fontClass);
    fontBtns.forEach(b => b.classList.toggle("active", b.dataset.font === fontClass));
  }
</script>
</body>
</html>

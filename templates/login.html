<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBakes — Login</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/login.css" />
</head>
<body>

  <!-- White spacer so icon can bleed above header border, matching topnav -->
  <div style="height: 18px; background: white;"></div>

  <!-- Simple header — no nav on login page, matches topnav aesthetic -->
  <header class="login-header">
    <div class="login-header-brand">
      <img class="login-header-icon"
           src="/static/images/HomBakes_Icon.png"
           alt="HomeBakes" />
      <span class="login-header-title">HomeBakes</span>
    </div>
    <div class="login-header-welcome-wrapper">
      <span class="login-header-welcome">Welcome to HomeBakes</span>
    </div>
    <!-- Empty right side to balance brand on left -->
    <div class="login-header-right"></div>
  </header>

  <!-- Full page kitchen photo background -->
  <div class="hero-section">
    <img class="hero-kitchen-bg"
         src="/static/images/kitchen_image.png"
         alt="Retro HomeBakes kitchen" />
    <div class="hero-overlay"></div>

    <div class="hero-content">

      <!-- Tagline badge -->
      <div class="tagline-badge">
        <p>Where you can recreate<br>Your Grandmother's Kitchen</p>
      </div>

      <!-- Login form -->
      <div class="login-box">
        <p class="login-label">Login</p>

        <div class="login-input-group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <input type="email" id="email" placeholder="email" autocomplete="email" />
        </div>

        <div class="login-input-group">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
          <input type="password" id="password" placeholder="password" autocomplete="current-password" />
        </div>

        <button class="btn-login" id="loginBtn">Login</button>
        <div class="login-error" id="loginError"></div>
        <div class="login-success" id="loginSuccess"></div>
        <div class="forgot-link"><a href="#" id="forgotPasswordLink">Forgot Password?</a></div>
        <div class="register-link"><a href="/register.html">Create an Account</a></div>
      </div>
    </div>
  </div>

  <!-- Features strip -->
  <div class="features-strip">
    <div class="feature-item">
      <img src="/static/images/short_recipe.png" alt="Shopping Lists" />
      <span>Make Shopping Lists</span>
    </div>
    <div class="feature-item">
      <img src="/static/images/recipe_box1.png" alt="Recipe Box" />
      <span>Archive &amp; Share Heritage Recipes</span>
    </div>
    <div class="feature-item">
      <img src="/static/images/meal_plan.png" alt="Meal Planning" />
      <span>Plan Weekly Meals</span>
    </div>
  </div>

<!-- Forgot Password Modal -->
<div id="forgotModal" style="display:none; position:fixed; inset:0;
     background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center;">
  <div style="background:white; border-radius:16px; padding:2rem;
              max-width:400px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,0.3);">
    <h2 style="font-family:'Playfair Display',serif; margin-bottom:0.5rem; font-size:1.3rem;">Reset Password</h2>
    <p style="color:#6B5B4E; font-size:0.88rem; margin-bottom:1.25rem;">
      Enter your email and we'll send you a link to reset your password.
    </p>
    <input type="email" id="resetEmail" placeholder="your@email.com"
           style="width:100%; padding:0.6rem 0.9rem; border:1.5px solid #E8E0D5;
                  border-radius:8px; font-family:'Lato',sans-serif; font-size:0.9rem;
                  box-sizing:border-box; outline:none; margin-bottom:0.75rem;" />
    <div id="resetError" style="color:#DC2626; font-size:0.82rem; min-height:1.2rem; margin-bottom:0.75rem;"></div>
    <div style="display:flex; gap:0.75rem; justify-content:flex-end;">
      <button id="resetCancelBtn"
              style="background:#F8F5EE; border:1.5px solid #E8E0D5; border-radius:8px;
                     padding:0.5rem 1.1rem; font-family:'Lato',sans-serif; font-weight:700;
                     font-size:0.85rem; cursor:pointer; color:#6B5B4E;">Cancel</button>
      <button id="resetSendBtn"
              style="background:#98D0D6; border:none; border-radius:8px;
                     padding:0.5rem 1.25rem; font-family:'Lato',sans-serif; font-weight:700;
                     font-size:0.85rem; cursor:pointer; color:#35595F;">Send Reset Link</button>
    </div>
  </div>
</div>

<script type="module">
  import { login, redirectIfLoggedIn, resetPassword } from "/static/js/auth.js";
  redirectIfLoggedIn();

  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorEl  = document.getElementById("loginError");
    errorEl.classList.remove("visible");
    if (!email || !password) {
      errorEl.textContent = "Please enter your email and password.";
      errorEl.classList.add("visible");
      return;
    }
    try {
      await login(email, password);
      window.location.href = "/index.html";
    } catch (err) {
      errorEl.textContent = friendlyError(err.code);
      errorEl.classList.add("visible");
    }
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("loginBtn").click();
  });

  // ── Forgot Password ──────────────────────────────────────────────────────
  const forgotModal = document.getElementById("forgotModal");

  document.getElementById("forgotPasswordLink").addEventListener("click", (e) => {
    e.preventDefault();
    document.getElementById("resetEmail").value = document.getElementById("email").value;
    document.getElementById("resetError").textContent = "";
    forgotModal.style.display = "flex";
    document.getElementById("resetEmail").focus();
  });

  document.getElementById("resetCancelBtn").addEventListener("click", () => {
    forgotModal.style.display = "none";
  });

  document.getElementById("resetSendBtn").addEventListener("click", async () => {
    const email   = document.getElementById("resetEmail").value.trim();
    const errorEl = document.getElementById("resetError");
    errorEl.textContent = "";

    if (!email) {
      errorEl.textContent = "Please enter your email address.";
      return;
    }

    try {
      await resetPassword(email);
      forgotModal.style.display = "none";
      const successEl = document.getElementById("loginSuccess");
      successEl.textContent = "Password reset email sent! Check your inbox.";
      successEl.classList.add("visible");
    } catch (err) {
      errorEl.textContent = err.code === "auth/user-not-found"
        ? "No account found with that email."
        : "Failed to send reset email. Please try again.";
    }
  });

  document.getElementById("resetEmail").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("resetSendBtn").click();
  });

  function friendlyError(code) {
    return {
      "auth/invalid-email":      "Please enter a valid email address.",
      "auth/user-not-found":     "No account found with that email.",
      "auth/wrong-password":     "Incorrect password.",
      "auth/too-many-requests":  "Too many attempts. Try again later.",
      "auth/invalid-credential": "Incorrect email or password.",
    }[code] || "Login failed. Please try again.";
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBakes — Recipe</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/recipe-view.css" />
</head>
<body>

  <!-- Universal nav injected by nav.js -->
  <div class="page-banner"><h1>Recipes</h1></div>
  <div class="page-content">

    <!-- Print + Download buttons -->
    <div class="action-bar">
      <button class="btn-circle" id="printBtn" title="Print recipe">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
      </button>
      <button class="btn-circle" id="downloadBtn" title="Download recipe">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
    </div>

    <!-- Loading state -->
    <div class="loading-card" id="loadingCard">Loading recipe...</div>

    <!-- Recipe card — hidden until loaded -->
    <div class="recipe-card-outer" id="recipeCardOuter" style="display:none;">

      <!-- ══════════════════════════════════════════
           HEADER ROW
           Tab (taller teal) + cream bar (shorter)
           align-items flex-end = shared bottom edge
      ══════════════════════════════════════════ -->
      <div class="recipe-card-header-row">

        <!-- Teal tab -->
        <div class="recipe-card-tab-css">
          <span class="recipe-card-tab-text">RECIPE</span>
        </div>

        <!-- Cream bar — title · category · meal type | edit delete -->
        <div class="recipe-card-header">
          <h1 class="recipe-name" id="recipeName">Recipe Name</h1>
          <span class="recipe-name-sep">·</span>
          <span class="recipe-category-badge" id="recipeCategory">Category</span>
          <div class="recipe-actions">
            <button class="btn-icon-sm" id="editBtn" title="Edit recipe">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="btn-icon-sm delete" id="deleteBtn" title="Delete recipe">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </div>
        </div>

      </div><!-- end header-row -->

      <!-- Card wrapper — clips content, rounded bottom -->
      <div class="recipe-card-wrapper">

        <!-- Teal card body with paper texture -->
        <div class="recipe-card-body font-typewriter" id="recipeCardBody">

          <div class="section-header">Ingredients</div>
          <div class="ingredients-section">
            <table class="ingredients-list">
              <thead>
                <tr>
                  <th style="width:40%">Name</th>
                  <th style="width:12%">Amt</th>
                  <th style="width:15%">Unit</th>
                  <th>Note</th>
                </tr>
              </thead>
              <tbody id="ingredientsList"></tbody>
            </table>
          </div>

          <div class="section-header" style="margin-top:1.25rem">Directions</div>
          <div class="directions-section" id="directionsList"></div>

          <div class="section-header" style="margin-top:1.25rem">Notes</div>
          <div class="notes-section">
            <p class="notes-text" id="recipeNotes">—</p>
          </div>

          <!-- Allergen warning — below notes -->
          <div class="allergen-warning" id="allergenWarning" style="display:none;">
            <div class="allergen-warning-header">⚠️ Contains Allergens</div>
            <div class="allergen-badges" id="allergenBadges"></div>
          </div>

        </div><!-- end recipe-card-body -->

        <!-- Cutlery footer -->
        <div class="recipe-card-footer">
          <div class="cutlery-icon">
            <svg viewBox="0 0 80 32" xmlns="http://www.w3.org/2000/svg" width="80" height="32">
              <ellipse cx="25" cy="7" rx="6" ry="7" fill="#35595F" opacity="0.6"/>
              <rect x="23" y="13" width="4" height="16" rx="2" fill="#35595F" opacity="0.6"/>
              <rect x="49" y="2" width="2.5" height="10" rx="1.25" fill="#35595F" opacity="0.6"/>
              <rect x="54" y="2" width="2.5" height="10" rx="1.25" fill="#35595F" opacity="0.6"/>
              <rect x="59" y="2" width="2.5" height="10" rx="1.25" fill="#35595F" opacity="0.6"/>
              <rect x="49" y="11" width="12.5" height="2" rx="1" fill="#35595F" opacity="0.6"/>
              <rect x="53.5" y="12" width="4" height="16" rx="2" fill="#35595F" opacity="0.6"/>
            </svg>
          </div>
        </div>

      </div><!-- end recipe-card-wrapper -->
    </div><!-- end recipe-card-outer -->

    <!-- Recipe image below card -->
    <div class="recipe-image-section" id="recipeImageSection" style="margin-top:1.5rem;">
      <div class="recipe-image-placeholder">📷 No recipe image yet</div>
    </div>

  </div><!-- end page-content -->

  <!-- Delete confirmation modal -->
  <div id="deleteModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center;">
    <div style="background:white; border-radius:16px; padding:2rem; max-width:400px; width:90%; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.3);">
      <h2 style="margin-bottom:0.75rem;">Delete this recipe?</h2>
      <p style="color:var(--text-light); margin-bottom:1.5rem; font-size:0.9rem;">This cannot be undone.</p>
      <div style="display:flex; gap:1rem; justify-content:center;">
        <button id="cancelDelete" class="btn btn-outline">Cancel</button>
        <button id="confirmDelete" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

<style>
  /* ── Allergen warning styles ── */
  .allergen-warning {
    background: rgba(22, 163, 74, 0.06);
    border: 1px solid rgba(22, 163, 74, 0.25);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.25rem;
    position: relative;
    z-index: 1;
  }

  .allergen-warning-header {
    font-family: 'Lato', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    color: #16A34A;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .allergen-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .allergen-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    background: rgba(22, 163, 74, 0.08);
    border: 1px solid rgba(22, 163, 74, 0.3);
    color: #16A34A;
    border-radius: 100px;
    padding: 0.25rem 0.65rem;
    font-size: 0.78rem;
    font-weight: 600;
    font-family: 'Lato', sans-serif;
    white-space: nowrap;
  }

  @media print {
    nav, .action-bar, .recipe-actions, .recipe-image-section { display: none !important; }
    body { background: white !important; }
    .recipe-card-outer { filter: none !important; }
    .page-content { padding: 0 !important; }
  }
</style>

<script type="module">
  import "/static/js/nav.js";
  import { requireAuth, logout } from "/static/js/auth.js";
  import { getRecipe, deleteRecipe } from "/static/js/api.js";

  const FONT_KEY = "hb_recipe_font";

  requireAuth(async (user) => {
    const params   = new URLSearchParams(window.location.search);
    const recipeId = params.get("id");
    if (!recipeId) { window.location.href = "/recipes.html"; return; }

    const savedFont = localStorage.getItem(FONT_KEY) || "font-typewriter";
    document.getElementById("recipeCardBody").className = `recipe-card-body ${savedFont}`;

    try {
      const recipe = await getRecipe(recipeId);
      const token   = await user.getIdTokenResult();
      const isAdmin = token.claims.admin === true;
      renderRecipe(recipe, user.uid, isAdmin);
    } catch (err) {
      document.getElementById("loadingCard").textContent = "Recipe not found.";
    }
  });

  function renderRecipe(recipe, uid, isAdmin = false) {
    document.title = `HomeBakes — ${recipe.title}`;
    document.getElementById("recipeName").textContent = recipe.title || "Untitled";
    document.getElementById("recipeCategory").textContent =
      [recipe.meal_type, recipe.recipe_category].filter(Boolean).join(" · ") || "Uncategorized";

    const isOwner = recipe.uid === uid || isAdmin;
    document.getElementById("editBtn").style.display   = isOwner ? "flex" : "none";
    document.getElementById("deleteBtn").style.display = isOwner ? "flex" : "none";

    // Ingredients
    const tbody = document.getElementById("ingredientsList");
    if (recipe.ingredients?.length > 0) {
      recipe.ingredients.sort((a,b) => a.order - b.order).forEach(ing => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${ing.ingredientName || "—"}</td>
          <td class="ingredient-amount">${ing.amount || "—"}</td>
          <td>${ing.unitName || "—"}</td>
          <td class="ingredient-note">${ing.note || ""}</td>`;
        tbody.appendChild(tr);
      });
    } else {
      tbody.innerHTML = `<tr><td colspan="4" style="color:rgba(53,89,95,0.5);font-style:italic;padding:0.5rem">No ingredients listed</td></tr>`;
    }

    // Directions
    const dirContainer = document.getElementById("directionsList");
    if (recipe.directions?.length > 0) {
      recipe.directions.sort((a,b) => a.order - b.order).forEach(dir => {
        const block = document.createElement("div");
        block.className = "direction-block";
        block.innerHTML = `
          ${dir.title ? `<p class="direction-title">${dir.title}</p>` : ""}
          <p class="direction-text">${dir.text}</p>`;
        dirContainer.appendChild(block);
      });
    } else {
      dirContainer.innerHTML = `<div class="direction-block"><p class="direction-text" style="opacity:0.5;font-style:italic">No directions yet</p></div>`;
    }

    if (recipe.notes) document.getElementById("recipeNotes").textContent = recipe.notes;

    // Allergens
    const allergens = recipe.allergens || [];
    if (allergens.length > 0) {
      const warningEl = document.getElementById("allergenWarning");
      const badgesEl  = document.getElementById("allergenBadges");
      const icons = {
        "Eggs": "🥚", "Fish": "🐟", "Milk": "🥛", "Peanuts": "🥜",
        "Sesame": "🫙", "Shellfish": "🦐", "Soybeans": "🫘",
        "Tree Nuts": "🌰", "Wheat": "🌾"
      };
      badgesEl.innerHTML = allergens.map(a =>
        `<span class="allergen-badge">${icons[a] || "⚠️"} ${a}</span>`
      ).join("");
      warningEl.style.display = "block";
    }

    if (recipe.imageUrl) {
      document.getElementById("recipeImageSection").innerHTML =
        `<img src="${recipe.imageUrl}" alt="${recipe.title}" />`;
    }

    document.getElementById("loadingCard").style.display     = "none";
    document.getElementById("recipeCardOuter").style.display = "block";
  }

  document.getElementById("editBtn").addEventListener("click", () => {
    const id = new URLSearchParams(window.location.search).get("id");
    window.location.href = `/recipe-form.html?id=${id}`;
  });

  const modal = document.getElementById("deleteModal");
  document.getElementById("deleteBtn").addEventListener("click", () => modal.style.display = "flex");
  document.getElementById("cancelDelete").addEventListener("click", () => modal.style.display = "none");
  document.getElementById("confirmDelete").addEventListener("click", async () => {
    const id = new URLSearchParams(window.location.search).get("id");
    try { await deleteRecipe(id); window.location.href = "/recipes.html"; }
    catch(err) { alert("Failed to delete. Please try again."); }
  });

  document.getElementById("printBtn").addEventListener("click", () => window.print());
  document.getElementById("downloadBtn").addEventListener("click", () => window.print());
  document.getElementById("logoutBtn")?.addEventListener("click", () => logout());
</script>
</body>
</html>

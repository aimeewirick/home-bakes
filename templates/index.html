<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBakes — My Kitchen</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/index.css" />
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a class="nav-brand" href="/index.html">
      <span class="nav-title">HomeBakes</span>
    </a>
    <ul class="nav-links">
      <li><a href="/index.html" class="active">Home</a></li>
      <li><a href="/meal-plans.html">Meal Plans</a></li>
      <li><a href="/recipes.html">Recipes</a></li>
      <li><a href="/shopping-lists.html">Shopping Lists</a></li>
    </ul>
    <div class="nav-icons">
      <button class="nav-icon-btn" id="logoutBtn" title="Log out">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Greeting bar -->
  <div class="greeting-bar">
    Welcome back, <span id="userName">Chef</span>!
  </div>

  <!-- Main dashboard -->
  <div class="dashboard">

    <h2 class="welcome-text">Welcome to Your Kitchen</h2>

    <!-- Fridge with magnet cards overlaid -->
    <div class="fridge-container">

      <!-- The fridge image -->
      <img class="fridge-img"
           src="/static/images/refrigerator.png"
           alt="Retro teal refrigerator" />

      <!-- Magnet cards sit on top of the fridge -->
      <div class="magnet-row">

        <a class="magnet-card" href="/meal-plans.html">
          <img src="/static/images/meal_plan.png" alt="Meal Plan" />
          <span class="magnet-label">Meal Plan</span>
        </a>

        <a class="magnet-card" href="/recipes.html">
          <img src="/static/images/recipe_box1.png" alt="My Recipes" />
          <span class="magnet-label">My Recipes</span>
        </a>

        <a class="magnet-card" href="/shopping-lists.html">
          <img src="/static/images/short_recipe.png" alt="Shopping Lists" />
          <span class="magnet-label">Shopping Lists</span>
        </a>

      </div>
    </div>
  </div>

<script type="module">
  import { requireAuth, logout } from "/static/js/auth.js";
  requireAuth(user => {
    document.getElementById("userName").textContent =
      user.displayName || user.email.split("@")[0];
  });
  document.getElementById("logoutBtn").addEventListener("click", () => logout());
</script>
</body>
</html>

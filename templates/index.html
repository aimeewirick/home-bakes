<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBakes — My Kitchen</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    /* Tile background using actual image */
    body {
      background-image: url('/static/images/yellow_tile.png');
      background-repeat: repeat;
      background-size: 300px;
    }

    .greeting-bar { background:white; padding:0.6rem 2rem; border-bottom:1px solid var(--border); font-size:0.9rem; color:var(--text-mid); }
    .greeting-bar span { font-weight:700; color:var(--teal-dark); }

    /* Main dashboard layout */
    .dashboard {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      gap: 2rem;
    }

    /* Oven hero image */
    .oven-hero {
      width: 100%;
      max-width: 420px;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.2));
    }

    /* Welcome text */
    .welcome-text {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      text-align: center;
    }

    /* Magnet cards row */
    .magnet-row {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 700px;
    }

    .magnet-card {
      background: white;
      border-radius: 8px;
      padding: 1.25rem 1rem;
      cursor: pointer;
      box-shadow: 3px 4px 12px rgba(0,0,0,0.2);
      text-decoration: none;
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      width: 180px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .magnet-card:nth-child(1) { transform: rotate(-1.5deg); }
    .magnet-card:nth-child(2) { transform: rotate(1deg); }
    .magnet-card:nth-child(3) { transform: rotate(-0.5deg); }
    .magnet-card:hover { transform: rotate(0deg) translateY(-5px) !important; box-shadow: 4px 10px 24px rgba(0,0,0,0.25); }

    .magnet-card img { width: 120px; height: 100px; object-fit: contain; }

    .magnet-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--teal-dark);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a class="nav-brand" href="/index.html">
      <span class="nav-title">HomeBakes</span>
    </a>
    <ul class="nav-links">
      <li><a href="/index.html" class="active">Home</a></li>
      <li><a href="/meal-plans.html">Meal Plans</a></li>
      <li><a href="/recipes.html">Recipes</a></li>
      <li><a href="/shopping-lists.html">Shopping Lists</a></li>
    </ul>
    <div class="nav-icons">
      <button class="nav-icon-btn" id="logoutBtn" title="Log out">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Greeting bar -->
  <div class="greeting-bar">Welcome back, <span id="userName">Chef</span>!</div>

  <!-- Main dashboard -->
  <div class="dashboard">

    <h2 class="welcome-text">Welcome to Your Kitchen</h2>

    <!-- Oven hero image -->
    <img class="oven-hero"
         src="/static/images/oven_no_background.PNG"
         alt="Retro teal oven" />

    <!-- Three navigation magnet cards -->
    <div class="magnet-row">

      <a class="magnet-card" href="/meal-plans.html">
        <img src="/static/images/Calendar.png" alt="Meal Plan" />
        <span class="magnet-label">Meal Plan</span>
      </a>

      <a class="magnet-card" href="/recipes.html">
        <img src="/static/images/recipe_box1.PNG" alt="My Recipes" />
        <span class="magnet-label">My Recipes</span>
      </a>

      <a class="magnet-card" href="/shopping-lists.html">
        <img src="/static/images/short_recipe.png" alt="Shopping Lists" />
        <span class="magnet-label">Shopping Lists</span>
      </a>

    </div>
  </div>

<script type="module">
  import { requireAuth, logout } from "/static/js/auth.js";
  requireAuth(user => {
    document.getElementById("userName").textContent =
      user.displayName || user.email.split("@")[0];
  });
  document.getElementById("logoutBtn").addEventListener("click", () => logout());
</script>
</body>
</html>

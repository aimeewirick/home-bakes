<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBakes — My Kitchen</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/index.css" />
</head>
<body>

  <!-- Universal nav injected by nav.js -->
  <!-- nav.js detects home page and adds personalized welcome -->

  <div class="dashboard">
    <div class="kitchen-scene">

      <!-- Cropped kitchen scene — full width -->
      <img class="kitchen-img"
           src="/static/images/kitchen_scene.png"
           alt="My Kitchen" />

      <!-- Recipe box — right counter, image only, hover glow -->
      <a class="recipe-box-counter" href="/recipes.html">
        <img src="/static/images/recipe_box2.png" alt="My Recipe Box" />
      </a>

      <!-- Picture frame — freezer section -->
      <div class="fridge-frame-wrapper">
        <div class="fridge-frame">
          <img id="framePhoto"
               class="fridge-frame-photo"
               src="/static/images/flower.png"
               alt="Your photo" />
          <img class="fridge-frame-img"
               src="/static/images/picture_frame.png"
               alt="Picture frame" />
          <div class="fridge-frame-overlay" id="frameOverlay">
            <span class="teaser-text" id="teaserText"></span>
          </div>
          <input type="file"
                 id="frameFileInput"
                 class="frame-file-input"
                 accept="image/*" />
        </div>
        <div class="frame-caption-wrapper">
          <span class="frame-caption" id="frameCaption">~ my happy place ~</span>
          <input type="text"
                 class="frame-caption-input"
                 id="frameCaptionInput"
                 maxlength="30"
                 placeholder="add a caption..." />
        </div>
      </div>

      <!-- Magnet cards — Meal Plan + Shopping List -->
      <div class="magnet-row">
        <a class="magnet-card" href="/meal-plans.html">
          <img src="/static/images/meal_plan.png" alt="Meal Plan" />
          <span class="magnet-label">Meal Plan</span>
        </a>
        <a class="magnet-card" href="/shopping-lists.html">
          <img src="/static/images/short_recipe.png" alt="Shopping Lists" />
          <span class="magnet-label">Shopping Lists</span>
        </a>
      </div>

    </div><!-- end kitchen-scene -->
  </div><!-- end dashboard -->

<script type="module">
  import "/static/js/nav.js";
  import { requireAuth } from "/static/js/auth.js";
  import "/static/js/profile.js";

  requireAuth(user => {
    // Pass username to nav.js for home page welcome
    const name = user.displayName || user.email.split("@")[0];
    document.getElementById("userName").textContent = name;
    // Update page title with name
    document.title = `HomeBakes — ${name}'s Kitchen`;
  });
</script>

<!-- Hidden span for nav.js to read username -->
<span id="userName" style="display:none;"></span>
</body>
</html>
